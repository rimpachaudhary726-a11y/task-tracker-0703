<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Task Tracker</h1>
  </header>

  <main>
    <section id="task-form-section">
      <h2>Add New Task</h2>
      <form id="task-form">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required>

        <label for="priority">Priority</label>
        <select id="priority" name="priority" required>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>

        <label for="due-date">Due Date</label>
        <input type="date" id="due-date" name="due-date" required>

        <button type="submit">Add Task</button>
      </form>
    </section>

    <section id="tasks-section">
      <h2>Tasks</h2>
      <div class="controls">
        <button id="sort-priority">Sort by Priority</button>
      </div>
      <ul id="task-list"></ul>
    </section>

    <div id="error-message" style="display:none;color:#ff6b6b;margin:1rem 0;"></div>
  </main>

  <footer>
    <p>© 2026 Task Tracker</p>
  </footer>

  <script src="script.js" onerror="document.getElementById('error-message').textContent='Failed to load script.js';document.getElementById('error-message').style.display='block';"></script>
</body>
</html>
